#default classes and other data - override the entirety of this file in your
# website to change the look / feel of the default widget settings.
slice:
  aud_ext:
  - .mp3
  img_ext:
  - .jpg
  - .jpeg
  - .png
  - .webp
  - .gif
  - .svg
  vid_ext:
  - .mp4
  - .mkv
# in the classes below _m is used for picnic_css break mode.
# %d substitution occurs item and feature with site.Params.resp.m 
class:
  block:
    divClass: flex one
    srcGrid:  none
    txtGrid:  full txt block
    srcClass: src block %s
    hrClass:  block-hr
    imgClass: image
    vidClass: video
  block_m:
    divClass: flex one four-%d
    srcGrid: full fourth-%d src block
    txtGrid: full three-fourth-%d txt block
  item:
    divClass: flex one
    srcGrid:  none
    txtGrid:  full txt block
    srcClass: src block %s
    hrClass:  block-hr
    imgClass: image
    vidClass: video
  item_m:
    divClass: flex one four-%d grow
    srcGrid: full fourth-%d src block
    txtGrid: full three-fourth-%d txt 
  feature-group:
    divClass: flex four
  feature:
    divClass: flex one
    srcGrid:  full
    txtGrid:  full txt
    srcClass: full
    hrClass:  feature-hr
    imgClass: feature
    vidClass: feature
