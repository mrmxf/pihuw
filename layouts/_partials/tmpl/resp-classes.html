{{- /*
  tmpl/resp-classes.html
  Emits an inline <style> block with PiHuW's responsive child fraction classes
  derived from site.Params.default.responsive.s, .m, and .w.

  PicnicCSS class families — two distinct roles:

  CONTAINER classes (flex one, flex six, flex nine-1100, …):
    Set the number of equal-width columns for children.
    PicnicCSS handles these via an attribute selector already in picnic.min.css:
      .flex[class*=nine]>*{flex-grow:0}
    This prevents children from growing beyond their assigned width.
    No extra CSS is generated here for container classes.

  CHILD classes (half-{bp}, ninth-{bp}, twelfth-{bp}, …):
    Applied to an individual child to set ITS OWN width at a breakpoint.
    e.g. <child class="seventh-ninth"> → 7/9 = 77.78% wide
    These are generated below for s, m, and w breakpoints.

  PicnicCSS ships child classes up to sixth-{bp}. This partial adds seventh
  through twelfth (and their numerator variants) which PicnicCSS omits.
  The half through sixth classes are also emitted; if s/m/w match PicnicCSS
  defaults (500/800/1100) they are harmless duplicates — browsers deduplicate.

  Called from tmpl/head.html. Output-generating partial — not value-returning.
*/ -}}
{{- $s := site.Params.default.responsive.s -}}
{{- $m := site.Params.default.responsive.m -}}
{{- $w := site.Params.default.responsive.w -}}
<style>
{{- range (slice $s $m $w) }}
@media (min-width: {{ . }}px) {
  /* — child fraction classes — width applied to the element itself — */
  .full-{{ . }}              { width: 100%;      display: block; }
  .half-{{ . }}              { width: 50%;       display: block; }
  .third-{{ . }}             { width: 33.33333%; display: block; }
  .two-third-{{ . }}         { width: 66.66667%; display: block; }
  .fourth-{{ . }}            { width: 25%;       display: block; }
  .three-fourth-{{ . }}      { width: 75%;       display: block; }

  .three-fifth-{{ . }}       { width: 60%;       display: block; }
  .four-fifth-{{ . }}        { width: 80%;       display: block; }
  .sixth-{{ . }}             { width: 16.66667%; display: block; }
  .two-sixth-{{ . }}         { width: 33.33333%; display: block; }
  .three-sixth-{{ . }}       { width: 50%;       display: block; }
  .four-sixth-{{ . }}        { width: 66.66667%; display: block; }
  .five-sixth-{{ . }}        { width: 83.33333%; display: block; }
